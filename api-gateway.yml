server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:

        # ✅ USER SERVICE ROUTE
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users,/users/**

        # ✅ ORDER SERVICE ROUTE (🔥 ADD THIS)
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders,/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# ✅ Logging (debugging)
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

# ✅ Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# ✅ Info
info:
  app:
    name: "gateway-service"
    description: "API Gateway for Food Delivery"
    version: "1.0"
