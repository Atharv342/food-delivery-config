server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service   # ✅ lowercase
          predicates:
            - Path=/users,/users/**   # ✅ handle both cases

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# ✅ Logging (for debugging)
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

# ✅ Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# ✅ Info
info:
  app:
    name: "gateway-service"
    description: "API Gateway for Food Delivery"
    version: "1.0"
