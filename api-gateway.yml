server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users,/users/**
          filters:
            - SetPath=/users/{segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# ✅ Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"   # expose all endpoints
  endpoint:
    health:
      show-details: always

# ✅ Info Endpoint Data
info:
  app:
    name: "gateway-service"
    description: "This is API Gateway"
    version: "1.0"
