server:
  port: 8082

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://localhost:3306/order_db?createDatabaseIfNotExist=true
    username: root
    password: Atharv@2003
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# 🔥 RESILIENCE4J CONFIGURATION
resilience4j:
  circuitbreaker:
    instances:
      userService:
        slidingWindowSize: 3                # number of calls to check
        failureRateThreshold: 50            # % failure to open circuit
        waitDurationInOpenState: 5s        # wait time before retry
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true

# 🔥 ACTUATOR (MONITORING)
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
